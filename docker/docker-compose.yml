version: '3.8'
services:
  shuai-mysql:
    container_name: shuai-mysql
    image: mysql:8.4.3
    restart: always
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1'
    ]
    environment:
#      MYSQL_DATABASE: 'ry-cloud'
      MYSQL_ROOT_PASSWORD: root
    networks:
      - shuai-network
  shuai-redis:
    container_name: shuai-redis
    image: redis:7.4.1
    restart: always
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/shuai/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/shuai/redis/redis.conf
    networks:
      - shuai-network
  shuai-nacos:
    container_name: shuai-nacos
    image: nacos/nacos-server
    restart: always
    build:
      context: ./nacos
    environment:
      - MODE=standalone
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - shuai-mysql
    networks:
      - shuai-network
  shuai-nginx:
    container_name: shuai-nginx
    image: nginx
    restart: always
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/shuai/projects/shuai-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - shuai-gateway
    links:
      - shuai-gateway
    networks:
      - shuai-network
  shuai-gateway:
    container_name: shuai-gateway
    image: shuai-gateway
    restart: always
    build:
      context: shuai/gateway
      dockerfile: Dockerfile
    ports:
      - "10011:10011"
    depends_on:
      - shuai-redis
    links:
      - shuai-redis
    networks:
      - shuai-network
  shuai-auth:
    container_name: shuai-auth
    image: shuai-auth
    restart: always
    build:
      context: shuai/auth
      dockerfile: Dockerfile
    ports:
      - "19081:19081"
    depends_on:
      - shuai-redis
      - shuai-mysql
    links:
      - shuai-redis
      - shuai-mysql
    networks:
      - shuai-network
  shuai-user:
    container_name: shuai-user
    image: shuai-user
    restart: always
    build:
      context: shuai/user
      dockerfile: Dockerfile
    ports:
      - "19082:19082"
    depends_on:
      - shuai-redis
      - shuai-mysql
    links:
      - shuai-redis
      - shuai-mysql
    networks:
      - shuai-network
  shuai-message-service:
    container_name: shuai-message-service
    image: shuai-message
    restart: always
    build:
      context: shuai/message
      dockerfile: Dockerfile
    ports:
      - "19085:19085"
    depends_on:
      - shuai-mysql
      - shuai-redis
    links:
      - shuai-mysql
      - shuai-redis
    networks:
      - shuai-network

networks:
  shuai-network: